<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EchoCard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">⚡ EchoCard</a>
      <div class="d-flex gap-4">
        {% if user.is_authenticated %}
          <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
            href="{% url 'home' %}">Home</a>

          <a class="nav-link {% if request.resolver_match.url_name == 'create_flashcards' %}active{% endif %}"
            href="{% url 'create_flashcards' %}">Flashcards</a>

          <a class="nav-link {% if request.resolver_match.url_name == 'create_notes' %}active{% endif %}"
            href="{% url 'create_notes' %}">Notes</a>

          <span class="nav-link text-secondary">
            👤 {{ user.username }}
          </span>

          <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-danger">
              Logout
            </button>
          </form>
        {% else %}
          <a class="nav-link" href="{% url 'login' %}">Login</a>

          <a class="btn btn-sm btn-primary" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container mt-3">
    {% for message in messages %}
    <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center py-3 border-top border-secondary mt-4">
    <small class="text-secondary">EchoCard — Powered by Groq</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
